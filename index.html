<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INSIDE tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <link rel="stylesheet" href="assets/css/style.css?v=applebg">
    <style>
        :root {
            --bg-dark: #050505;
            --glass-bg: rgba(20, 20, 22, 0.45);
            --glass-border: rgba(255, 255, 255, 0.06);
            --accent-blue: #0A84FF;
            --ios-green: #30D158;
            --ios-red: #FF453A;
            --ios-gray: #8E8E93;
            --ios-bg: #1C1C1E;

            /* REFINED APPLE TOKENS */
            --apple-blur: 40px;
            --apple-p3-blue: #007AFF;
            --apple-p3-green: #34C759;
            --apple-p3-red: #FF3B30;
            --apple-p3-purple: #AF52DE;
        }

        .refined-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--apple-blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--apple-blur)) saturate(180%);
            border: 1px solid var(--glass-border);
        }

        /* HIDE SCROLLBARS GLOBALLY */
        * { scrollbar-width: none; -ms-overflow-style: none; }
        *::-webkit-scrollbar { display: none; }
        
        @keyframes apple-scale-in {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        .animate-apple-in {
            animation: apple-scale-in 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>

<body class="h-screen flex flex-col text-sm selection:bg-blue-500/30">

    <!-- AMBIENT ORBS (LIVING BACKGROUND) -->
    <div class="ambient-orb orb-1 pointer-events-none"></div>
    <div class="ambient-orb orb-2 pointer-events-none"></div>
    <div class="ambient-orb orb-3 pointer-events-none"></div>
    <div class="ambient-frost-layer pointer-events-none"></div>

    <!-- HAMBURGER MENU BACKDROP (FULL SCREEN BLUR) -->
    <div id="hamburgerBackdrop"
        class="fixed inset-0 bg-[#030303]/40 backdrop-blur-[12px] hidden z-20 transition-all duration-300"></div>

    <!-- 1. REFINED GLOBAL HEADER -->
    <div class="glass-header refined-glass px-4 flex justify-between items-center shrink-0 z-50 h-14 border-b border-white/5 shadow-2xl">
        <!-- LEFT: INPUTS -->
        <div class="flex items-center gap-2">
            <div class="relative">
                <input type="text" id="spinInput" inputmode="numeric" autocomplete="off" maxlength="2"
                    onkeydown="if(event.key==='Enter'){event.preventDefault();addSpin();}"
                    class="ios-input w-16 h-8 text-lg font-bold text-center placeholder-white/20 bg-white/5 border border-white/10 rounded-lg focus:border-[#0A84FF] transition-all"
                    placeholder="#">
            </div>

            <button id="addSpinBtn" onclick="addSpin()"
                class="h-8 px-4 bg-[#0A84FF] hover:bg-[#007AFF] text-white font-bold rounded-lg shadow-sm text-[10px] tracking-widest flex items-center justify-center transition-all">
                ADD
            </button>

            <button onclick="undoSpin()"
                class="h-8 w-8 bg-white/5 hover:bg-white/10 text-white/40 hover:text-white rounded-lg border border-white/10 flex items-center justify-center transition-all">
                <i class="fas fa-undo text-[10px]"></i>
            </button>
        </div>

        <!-- RIGHT: TOOLS -->
        <div class="flex items-center gap-1.5">


            <div id="patternFilterShell" class="relative">
                <button id="patternsToggleBtn" onclick="togglePatternFilterPopover()"
                    class="h-8 px-3 bg-white/5 hover:bg-white/10 text-[#BF5AF2] font-bold rounded-lg border border-[#BF5AF2]/10 flex items-center gap-2 text-[10px] transition-all">
                    <i class="fas fa-filter"></i>
                    <span class="hidden md:inline">PATTERNS</span>
                </button>
                <div id="patternFilterPopover" class="pattern-filter-popover hidden refined-glass rounded-2xl shadow-2xl animate-apple-in absolute top-full left-0 mt-2 w-[280px] p-2 z-[70]">
                    <div class="flex justify-between items-center px-3 py-2 border-b border-white/10 mb-2">
                        <span class="text-[10px] font-black uppercase tracking-widest text-[#BF5AF2] drop-shadow-[0_0_8px_rgba(191,90,242,0.4)]">Active Filters</span>
                        <button onclick="window.closePatternFilterPopover()" class="text-white/40 hover:text-white transition-colors h-6 w-6 flex items-center justify-center rounded-full bg-white/5 border border-white/5"><i class="fas fa-times text-[10px]"></i></button>
                    </div>
                    <div id="patternsList" class="max-h-[320px] overflow-y-auto custom-scroll pr-1 flex flex-col gap-1">
                        <!-- Popover content remains managed by JS -->
                    </div>
                </div>
            </div>

            <button onclick="toggleModal('betsModal'); renderUserAnalytics();"
                class="h-8 px-3 bg-white/5 hover:bg-white/10 text-[#0A84FF] font-bold rounded-lg border border-[#0A84FF]/10 flex items-center gap-2 text-[10px] transition-all">
                <i class="fas fa-list-check"></i>
                <span class="hidden lg:inline">BETS</span>
            </button>

            <button onclick="toggleModal('analyticsModal'); renderAnalytics();"
                class="h-8 px-3 bg-white/5 hover:bg-white/10 text-[#FFD60A] font-bold rounded-lg border border-[#FFD60A]/10 flex items-center gap-2 text-[10px] transition-all">
                <i class="fas fa-chart-line"></i>
                <span class="hidden lg:inline">STATS</span>
            </button>

            <button onclick="toggleAnalyticsHUD()" id="hudToggleBtn"
                class="h-8 px-3 bg-white/5 hover:bg-white/10 text-[#30D158] font-bold rounded-lg border border-[#30D158]/10 flex items-center gap-2 text-[10px] transition-all">
                <i class="fas fa-chart-pie"></i>
                <span class="hidden lg:inline">HUD</span>
            </button>

            <div class="h-4 w-[1px] bg-white/10 mx-1"></div>

            <button id="headerMenuBtn"
                class="h-8 w-8 bg-white/5 hover:bg-white/10 text-white rounded-lg border border-white/10 flex items-center justify-center transition-all">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </div>

    <!-- HAMBURGER DROPDOWN MENU -->
    <div id="hamburgerMenu"
        class="hidden fixed top-[64px] right-4 w-64 rounded-xl border border-white/10 bg-[#0A0A0C]/95 backdrop-blur-[40px] shadow-[0_20px_50px_rgba(0,0,0,0.9)] z-50 overflow-hidden transform origin-top-right transition-all duration-200">

        <!-- STOPWATCH SECTION -->
        <div class="px-4 py-3 border-b border-white/5 bg-white/5 flex flex-col items-center justify-center">
            <div class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider mb-2 w-full text-left">Session
                Timer</div>
            <div id="stopwatchDisplay"
                class="text-2xl font-mono text-white mb-3 tracking-widest font-semibold drop-shadow-md">00:00:00</div>
            <div class="flex gap-2 w-full justify-center">
                <button onclick="toggleStopwatch()" id="stopwatchToggleBtn"
                    class="flex-1 text-[10px] font-semibold uppercase tracking-wider bg-[#30D158]/20 text-[#30D158] hover:bg-[#30D158]/30 py-2 rounded-lg flex items-center justify-center transition-colors border border-[#30D158]/30">
                    <i class="fas fa-play mr-2" id="stopwatchIcon"></i> <span id="stopwatchText">Start</span>
                </button>
                <button onclick="resetStopwatch()"
                    class="flex-1 text-[10px] font-semibold uppercase tracking-wider bg-[#ff1a33]/20 text-[#ff1a33] hover:bg-[#ff1a33]/30 py-2 rounded-lg flex items-center justify-center transition-colors border border-[#ff1a33]/30">
                    <i class="fas fa-undo mr-2"></i> Reset
                </button>
            </div>
        </div>

        <!-- DATA SECTION -->
        <div class="px-4 py-3 border-b border-white/5 bg-white/5 flex justify-between items-center cursor-pointer hover:bg-white/10 transition-colors"
            onclick="toggleAccordion('dataSubMenu')">
            <span class="text-[10px] font-semibold text-gray-300 uppercase tracking-wider">Data Settings</span>
            <i class="fas fa-chevron-down text-gray-500 text-xs transition-transform duration-200"
                id="dataSubMenuIcon"></i>
        </div>
        <div id="dataSubMenu" class="hidden bg-black/40 overflow-hidden transition-all duration-200">
            <button onclick="exportSpins()"
                class="w-full text-left px-4 py-3 text-xs text-gray-300 hover:bg-white/10 hover:text-white transition-colors flex items-center group">
                <i
                    class="fas fa-download mr-3 text-[#0A84FF] w-4 text-center group-hover:scale-110 transition-transform"></i>
                Export History
            </button>
            <label
                class="w-full text-left px-4 py-3 text-xs text-gray-300 hover:bg-white/10 hover:text-white border-b border-white/5 transition-colors cursor-pointer flex items-center m-0 group">
                <i
                    class="fas fa-upload mr-3 text-[#30D158] w-4 text-center group-hover:scale-110 transition-transform"></i>
                Import History
                <input type="file" id="importFile" class="hidden" accept=".json" onchange="importSpins(this)">
            </label>
        </div>

        <!-- INPUT SECTION -->
        <div class="px-4 py-3 border-b border-white/5 bg-white/5 flex justify-between items-center cursor-pointer hover:bg-white/10 transition-colors"
            onclick="toggleAccordion('inputSubMenu')">
            <span class="text-[10px] font-semibold text-gray-300 uppercase tracking-wider">Input Settings</span>
            <i class="fas fa-chevron-down text-gray-500 text-xs transition-transform duration-200"
                id="inputSubMenuIcon"></i>
        </div>
        <div id="inputSubMenu" class="hidden bg-black/40 overflow-hidden transition-all duration-200">
            <div class="px-4 py-3 border-b border-white/5 hover:bg-white/10 transition-colors flex items-center justify-between cursor-pointer group"
                onclick="toggleInputLayout()">
                <div class="text-xs text-gray-300 group-hover:text-white flex items-center">
                    <i
                        class="fas fa-th mr-3 text-[#BF5AF2] w-4 text-center group-hover:scale-110 transition-transform"></i>
                    Layout Map
                </div>
                <span id="layoutLabel"
                    class="text-[9px] font-bold bg-white/10 px-2.5 py-1 rounded-md text-white shadow-inner">GRID</span>
            </div>
        </div>

        <!-- STRATEGY SETTINGS -->
        <div class="px-4 py-3 border-b border-white/5 bg-white/5 flex justify-between items-center cursor-pointer hover:bg-white/10 transition-colors"
            onclick="toggleAccordion('strategySubMenu')">
            <span class="text-[10px] font-semibold text-gray-300 uppercase tracking-wider">Strategy Settings</span>
            <i class="fas fa-chevron-down text-gray-500 text-xs transition-transform duration-200"
                id="strategySubMenuIcon"></i>
        </div>
        <div id="strategySubMenu" class="hidden bg-black/40 overflow-hidden transition-all duration-200">
            <div class="px-4 py-3 border-b border-white/5">
                <div class="flex flex-col gap-2">
                    <label for="hamburgerStrategySelect" class="text-xs text-gray-300 flex items-center">
                        <i class="fas fa-chess-knight mr-2 text-[#0A84FF]"></i>
                        Active Strategy
                    </label>
                    <select id="hamburgerStrategySelect" onchange="setGameplayStrategy(this.value)"
                        class="w-full bg-white/5 border border-white/10 rounded-lg py-2 px-3 text-sm text-white focus:outline-none focus:ring-1 focus:ring-[#30D158] transition-all">
                        <option value="series">SERIES</option>
                        <option value="combo">COMBOS</option>
                        <option value="inside">INSIDE PATTERNS</option>
                    </select>
                </div>
            </div>
        </div>



        <button onclick="resetSession()"
            class="w-full text-left px-4 py-3 text-xs text-gray-300 hover:bg-[#ff1a33]/20 hover:text-[#ff1a33] transition-colors flex items-center group">
            <i
                class="fas fa-power-off mr-3 text-red-500/70 group-hover:text-[#ff1a33] w-4 text-center transition-colors"></i>
            Reset Session
        </button>
    </div>

    <!-- 2. DASHBOARD -->
    <div id="dashboard"
        class="px-4 py-1.5 flex gap-2 overflow-x-auto h-[80px] shrink-0 items-center glass-strip shadow-inner">
        <div
            class="dashboard-empty w-full text-center text-[10px] font-medium text-[#8E8E93]/80 border border-dashed border-white/5 rounded-xl p-2 select-none tracking-wide flex items-center justify-center h-[60px]">
        </div>
    </div>

    <!-- 3. MAIN CONTENT -->
    <div class="flex-1 flex overflow-hidden">
        <div class="hidden md:block w-[240px] shrink-0 mesmer-grid p-3 overflow-y-auto custom-scroll" id="desktopGrid">
            <div class="grid grid-cols-3 gap-2 pb-16">
                <button class="grid-btn grid-green col-span-3 font-bold text-sm" onclick="handleGridClick(0)">ZERO</button>
                <button class="grid-btn grid-red" onclick="handleGridClick(1)">1</button>
                <button class="grid-btn grid-black" onclick="handleGridClick(2)">2</button>
                <button class="grid-btn grid-red" onclick="handleGridClick(3)">3</button>
                <button class="grid-btn grid-black" onclick="handleGridClick(4)">4</button>
                <button class="grid-btn grid-red" onclick="handleGridClick(5)">5</button>
                <button class="grid-btn grid-black" onclick="handleGridClick(6)">6</button>
                <button class="grid-btn grid-red" onclick="handleGridClick(7)">7</button>
                <button class="grid-btn grid-black" onclick="handleGridClick(8)">8</button>
                <button class="grid-btn grid-red" onclick="handleGridClick(9)">9</button>
                <button class="grid-btn grid-black" onclick="handleGridClick(10)">10</button>
                <button class="grid-btn grid-black" onclick="handleGridClick(11)">11</button>
                <button class="grid-btn grid-red" onclick="handleGridClick(12)">12</button>
                <button class="grid-btn grid-black" onclick="handleGridClick(13)">13</button>
                <button class="grid-btn grid-red" onclick="handleGridClick(14)">14</button>
                <button class="grid-btn grid-black" onclick="handleGridClick(15)">15</button>
                <button class="grid-btn grid-red" onclick="handleGridClick(16)">16</button>
                <button class="grid-btn grid-black" onclick="handleGridClick(17)">17</button>
                <button class="grid-btn grid-red" onclick="handleGridClick(18)">18</button>
                <button class="grid-btn grid-red" onclick="handleGridClick(19)">19</button>
                <button class="grid-btn grid-black" onclick="handleGridClick(20)">20</button>
                <button class="grid-btn grid-red" onclick="handleGridClick(21)">21</button>
                <button class="grid-btn grid-black" onclick="handleGridClick(22)">22</button>
                <button class="grid-btn grid-red" onclick="handleGridClick(23)">23</button>
                <button class="grid-btn grid-black" onclick="handleGridClick(24)">24</button>
                <button class="grid-btn grid-red" onclick="handleGridClick(25)">25</button>
                <button class="grid-btn grid-black" onclick="handleGridClick(26)">26</button>
                <button class="grid-btn grid-red" onclick="handleGridClick(27)">27</button>
                <button class="grid-btn grid-black" onclick="handleGridClick(28)">28</button>
                <button class="grid-btn grid-black" onclick="handleGridClick(29)">29</button>
                <button class="grid-btn grid-red" onclick="handleGridClick(30)">30</button>
                <button class="grid-btn grid-black" onclick="handleGridClick(31)">31</button>
                <button class="grid-btn grid-red" onclick="handleGridClick(32)">32</button>
                <button class="grid-btn grid-black" onclick="handleGridClick(33)">33</button>
                <button class="grid-btn grid-red" onclick="handleGridClick(34)">34</button>
                <button class="grid-btn grid-black" onclick="handleGridClick(35)">35</button>
                <button class="grid-btn grid-red" onclick="handleGridClick(36)">36</button>
            </div>
        </div>

        <div class="flex-1 flex flex-col relative w-full bg-transparent overflow-hidden" id="scrollContainer">
            <div class="flex-1 overflow-y-auto custom-scroll">
                <table class="history-table">
                    <colgroup>
                        <col style="width: 8%;">
                        <col style="width: 10%;">
                        <col style="width: 12%;">
                        <col style="width: 25%;">
                        <col style="width: 45%;">
                    </colgroup>
                    <thead>
                        <tr>
                            <th class="text-center">#</th>
                            <th class="text-center">SPIN</th>
                            <th class="text-center">FACE</th>
                            <th class="text-center" id="historyComboHeader">COMBO</th>
                            <th class="text-center">PREDICTION</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody"></tbody>
                </table>
                <div class="h-16"></div>
            </div>
        </div>
    </div>

    <!-- MODAL TEMPLATES (Injected Dynamically) -->

    <!-- ANALYTICS HUD (FLOATING) -->
    <div id="analyticsHUD"
        class="hidden fixed z-[40] flex-col glass-menu overflow-hidden shadow-[0_15px_40px_rgba(0,0,0,0.8)] border border-white/10"
        style="width: 340px; top: 80px; right: 16px;">
        <div id="hudHeader" class="cursor-move select-none">
            <div class="hud-segment">
                <button onclick="setHudAnalyticsStrategy('series')" id="hudStrategySeriesBtn" class="hud-segment-btn"
                    title="Show series strategy in HUD">Series</button>
                <button onclick="setHudAnalyticsStrategy('combo')" id="hudStrategyComboBtn" class="hud-segment-btn"
                    title="Show combo strategy in HUD">Combo</button>
            </div>
            <button onclick="toggleHudColdMode()" id="hudColdBtn" class="hud-toolbar-btn" title="Toggle hot/cold mode">
                <i class="fas fa-fire"></i>
                <span id="hudColdBtnLabel">Hot</span>
            </button>
            <button onclick="toggleHudHistoryScope()" id="hudScopeBtn" class="hud-toolbar-btn"
                title="Toggle recent/all scope">All</button>

            <button onclick="toggleAnalyticsHUD()" class="hud-close-btn" title="Close analytics HUD">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div id="hudBody" class="flex-1 flex flex-col overflow-hidden relative">
            <div id="hudSummary" class="hud-summary-grid">
                <div class="hud-summary-card">
                    <div class="hud-summary-top">
                        <div class="hud-summary-label">F1</div>
                        <div class="hud-summary-value">0</div>
                    </div>
                    <div class="hud-summary-copy">0% • g0</div>
                </div>
                <div class="hud-summary-card">
                    <div class="hud-summary-top">
                        <div class="hud-summary-label">F2</div>
                        <div class="hud-summary-value">0</div>
                    </div>
                    <div class="hud-summary-copy">0% • g0</div>
                </div>
                <div class="hud-summary-card">
                    <div class="hud-summary-top">
                        <div class="hud-summary-label">F3</div>
                        <div class="hud-summary-value">0</div>
                    </div>
                    <div class="hud-summary-copy">0% • g0</div>
                </div>
                <div class="hud-summary-card">
                    <div class="hud-summary-top">
                        <div class="hud-summary-label">F4</div>
                        <div class="hud-summary-value">0</div>
                    </div>
                    <div class="hud-summary-copy">0% • g0</div>
                </div>
                <div class="hud-summary-card">
                    <div class="hud-summary-top">
                        <div class="hud-summary-label">F5</div>
                        <div class="hud-summary-value">0</div>
                    </div>
                    <div class="hud-summary-copy">0% • g0</div>
                </div>
            </div>
            <div class="hud-table-shell">
                <div class="hud-table-head">
                    <div id="hudColumnLabel">Sequence</div>
                    <div id="hudMetricLabel">Activity</div>
                    <div id="hudRateLabel">Rate</div>
                </div>
                <div id="hudStats" class="hud-table-body custom-scroll overflow-y-auto">
                    <div class="hud-empty-state">Awaiting telemetry...</div>
                </div>
            </div>
        </div>
        <div id="hudResizeHandle"
            class="absolute bottom-0 right-0 w-4 h-4 cursor-nwse-resize flex items-center justify-center opacity-30 hover:opacity-100 transition-opacity">
            <i class="fas fa-caret-right rotate-45 text-[8px] text-white"></i>
        </div>
    </div>

    <!-- SCRIPTS -->
    <!-- 1. CONFIG & STATE -->
    <script src="js/modules/config.js?v=flush1"></script>
    <script src="js/modules/engine/state.js?v=flush1"></script>

    <!-- 2. STORE & PERSISTENCE -->
    <script src="js/modules/engine/store.js?v=flush1"></script>
    <script src="js/modules/persistence.js?v=flush1"></script>

    <!-- 3. SERVICES -->
    <script src="js/modules/audio/audio-engine.js?v=flush1"></script>


    <!-- 4. ENGINE LAYER -->
    <script src="js/modules/engine/core.js?v=flush1"></script>
    <script src="js/modules/engine/prediction.js?v=flush1"></script>
    <script src="js/modules/engine/contract.js?v=flush1"></script>
    <script src="js/modules/engine/adapter.js?v=flush1"></script>

    <!-- 5. STRATEGIES -->
    <script src="js/strategies/strategy.series.js?v=flush1"></script>
    <script src="js/strategies/strategy.combo.js?v=flush1"></script>

    <!-- INSIDE PATTERNS (Modular Directory) -->
    <script src="js/strategies/inside/index.js?v=flush1"></script>
    <script src="js/strategies/inside/patterns/pattern.rptng.js?v=flush1"></script>
    <script src="js/strategies/inside/patterns/pattern.1c-rptng.js?v=flush1"></script>
    <script src="js/strategies/inside/patterns/pattern.brkt.js?v=flush1"></script>
    <script src="js/strategies/inside/patterns/pattern.121.js?v=flush1"></script>
    <script src="js/strategies/inside/patterns/pattern.123.js?v=flush1"></script>
    <script src="js/strategies/inside/patterns/pattern.22.js?v=flush1"></script>
    <script src="js/strategies/inside/patterns/pattern.seqvarbrkt.js?v=flush1"></script>

    <!-- 6. UI RENDERERS & COMPONENTS -->
    <script src="js/modules/ui/renderers/history.js?v=flush1"></script>
    <script src="js/modules/ui/renderers/dashboard.js?v=flush1"></script>
    <script src="js/modules/ui/renderers/analytics.js?v=flush1"></script>
    <script src="js/modules/ui/controller.js?v=flush1"></script>
    <script src="js/modules/ui/hud-manager.js?v=flush1"></script>


    <!-- UI COMPONENTS (Modals) -->
    <script src="js/modules/ui/components/modal-core.js?v=flush1"></script>
    <script src="js/modules/ui/components/modal-bets.js?v=flush1"></script>
    <script src="js/modules/ui/renderers/analytics.js?v=flush1"></script>
    <script src="js/modules/ui/components/modal-analytics.js?v=flush1"></script>
    <script src="js/modules/ui/components/modal-pattern-detail.js?v=flush1"></script>

    <script src="js/modules/ui/components/modal-confirm.js?v=flush1"></script>


    <!-- 7. APP BOOTSTRAP -->
    <script src="js/modules/input/processor.js?v=flush1"></script>
    <script src="app.js?v=flush1"></script>

    <!-- Graph Tooltip -->
    <div id="graphTooltip"
        class="fixed hidden z-[100] pointer-events-none p-2 text-xs font-semibold text-white bg-black/70 border border-white/20 rounded-md shadow-lg backdrop-blur-sm">
    </div>
</body>

</html>
